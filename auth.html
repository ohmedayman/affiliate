<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - ميلانو F16</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>🛡️ ميلانو <span style="color:var(--secondary)">F16</span></h1>
        <p>ابدأ تكسب مع برنامج العمولة</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">تسجيل الدخول</button>
        <button class="auth-tab" data-tab="register" onclick="switchTab('register')">حساب جديد</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="login-form" style="display:block;">
        <div class="alert alert-error" style="display:none;"></div>

        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="login-email" placeholder="example@email.com" required>
        </div>

        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
          تسجيل الدخول
        </button>

        <div style="text-align:center;margin:1rem 0;">
          <a href="javascript:void(0)" onclick="handleForgotPassword()" style="color:var(--primary);font-size:0.9rem;">نسيت كلمة المرور؟</a>
        </div>

        <div style="text-align:center;margin:1rem 0;color:var(--text-secondary);">أو</div>

        <button type="button" class="btn btn-block btn-lg" style="background:#4285f4;color:white;" onclick="handleGoogleLogin()">
          تسجيل الدخول بجوجل
        </button>
      </form>

      <!-- REGISTER FORM -->
      <form id="register-form" style="display:none;">
        <div class="alert alert-error" style="display:none;"></div>

        <div class="form-group">
          <label>الاسم الكامل</label>
          <input type="text" id="reg-name" placeholder="محمد أحمد" required>
        </div>

        <div class="form-group">
          <label>رقم الهاتف</label>
          <input type="tel" id="reg-phone" placeholder="01012345678" required>
        </div>

        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="reg-email" placeholder="example@email.com" required>
        </div>

        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="reg-password" placeholder="6 حروف على الأقل" required>
        </div>

        <div class="form-group">
          <label>تأكيد كلمة المرور</label>
          <input type="password" id="reg-confirm-password" placeholder="أعد كتابة كلمة المرور" required>
        </div>

        <button type="submit" class="btn btn-secondary btn-block btn-lg" id="reg-btn">
          إنشاء حساب
        </button>

        <div style="text-align:center;margin:1rem 0;color:var(--text-secondary);">أو</div>

        <button type="button" class="btn btn-block btn-lg" style="background:#4285f4;color:white;" onclick="handleGoogleLogin()">
          التسجيل بجوجل
        </button>
      </form>

      <div style="text-align:center;margin-top:1.5rem;">
        <a href="index.html" style="color:var(--text-secondary);font-size:0.9rem;">العودة للصفحة الرئيسية</a>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
