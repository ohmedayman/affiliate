<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - ميلانو F16</title>
  <link rel="stylesheet" href="css/landing.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <img src="https://assets.wuiltstore.com/cmksv9bcw0ki601gn64lf4joy_Gemini_Generated_Image_8x0fug8x0fug8x0f.webp" alt="ميلانو" style="width:60px;height:60px;border-radius:14px;object-fit:cover;margin-bottom:.5rem">
        <h1>ميلانو <span style="background:linear-gradient(135deg,#ff6d00,#ff9100);-webkit-background-clip:text;-webkit-text-fill-color:transparent">F16</span></h1>
        <p>ابدأ تكسب مع برنامج العمولة</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">تسجيل الدخول</button>
        <button class="auth-tab" data-tab="register" onclick="switchTab('register')">حساب جديد</button>
      </div>

      <form id="login-form" style="display:block;">
        <div class="alert alert-error" style="display:none;"></div>
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="login-email" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:1rem">
          <span class="btn-text">تسجيل الدخول</span>
        </button>
        <div class="auth-divider">أو</div>
        <button type="button" class="btn btn-ghost btn-block" onclick="handleGoogleLogin()">
          <span>🔵</span> الدخول بـ Google
        </button>
      </form>

      <form id="register-form" style="display:none;">
        <div class="alert alert-error" style="display:none;"></div>
        <div class="form-group">
          <label>الاسم الكامل</label>
          <input type="text" id="reg-name" placeholder="محمد أحمد" required>
        </div>
        <div class="form-group">
          <label>رقم التليفون</label>
          <input type="tel" id="reg-phone" placeholder="01012345678" required>
        </div>
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="reg-email" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="reg-password" placeholder="6 أحرف على الأقل" required minlength="6">
        </div>
        <button type="submit" class="btn btn-success btn-block btn-lg" style="margin-top:1rem">
          <span class="btn-text">إنشاء حساب</span>
        </button>
      </form>

      <p style="text-align:center;margin-top:1.5rem;font-size:.85rem;color:var(--text-secondary)">
        عندك حساب بالفعل؟ <a href="auth.html" style="color:var(--primary);font-weight:600">سجّل دخولك</a>
      </p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
