<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - ميلانو F16</title>
  <link rel="stylesheet" href="css/landing.css">
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css">
  <link rel="icon" href="https://assets.wuiltstore.com/cmksv9bcw0ki601gn64lf4joy_Gemini_Generated_Image_8x0fug8x0fug8x0f.webp">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <img src="https://assets.wuiltstore.com/cmksv9bcw0ki601gn64lf4joy_Gemini_Generated_Image_8x0fug8x0fug8x0f.webp" alt="ميلانو" style="width:60px;height:60px;border-radius:14px;object-fit:cover;margin-bottom:.5rem">
        <h1>ميلانو <span style="background:linear-gradient(135deg,#ff6d00,#ff9100);-webkit-background-clip:text;-webkit-text-fill-color:transparent">F16</span></h1>
        <p>ابدأ تكسب مع برنامج العمولة</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">تسجيل الدخول</button>
        <button class="auth-tab" data-tab="register" onclick="switchTab('register')">حساب جديد</button>
      </div>

      <form id="login-form" style="display:block;">
        <div class="alert alert-error" style="display:none;"></div>
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="login-email" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:1rem">
          <span class="btn-text"><i class="fi fi-rr-sign-in-alt"></i> تسجيل الدخول</span>
        </button>
        <div class="auth-divider">أو</div>
        <button type="button" class="btn btn-google btn-block" onclick="handleGoogleLogin()">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          الدخول بـ Google
        </button>
      </form>

      <form id="register-form" style="display:none;">
        <div class="alert alert-error" style="display:none;"></div>
        <div class="form-group">
          <label>الاسم الكامل</label>
          <input type="text" id="reg-name" placeholder="محمد أحمد" required>
        </div>
        <div class="form-group">
          <label>رقم التليفون</label>
          <input type="tel" id="reg-phone" placeholder="01012345678" required>
        </div>
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="reg-email" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="reg-password" placeholder="6 أحرف على الأقل" required minlength="6">
        </div>
        <button type="submit" class="btn btn-success btn-block btn-lg" style="margin-top:1rem">
          <span class="btn-text"><i class="fi fi-rr-user-add"></i> إنشاء حساب</span>
        </button>
        <div class="auth-divider">أو</div>
        <button type="button" class="btn btn-google btn-block" onclick="handleGoogleLogin()">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          التسجيل بـ Google
        </button>
      </form>

      <p style="text-align:center;margin-top:1.5rem;font-size:.85rem;color:var(--text-secondary)">
        عندك حساب بالفعل؟ <a href="auth.html" style="color:var(--primary);font-weight:600">سجّل دخولك</a>
      </p>

      <div style="text-align:center;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)">
        <a href="admin-login.html" style="font-size:.8rem;color:var(--text-secondary);text-decoration:none;display:inline-flex;align-items:center;gap:.3rem">
          🔐 دخول الإدارة
        </a>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
