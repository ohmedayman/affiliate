<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - ميلانو F16</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Landing CSS (includes auth styles) -->
  <link rel="stylesheet" href="css/landing.css">
  <!-- Flaticon Icons -->
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css">
  <link rel="icon" href="https://assets.wuiltstore.com/cmksv9bcw0ki601gn64lf4joy_Gemini_Generated_Image_8x0fug8x0fug8x0f.webp">
</head>
<body>
  <div class="auth-container">
    <!-- Animated Background -->
    <div class="auth-bg">
      <div class="mesh-gradient"></div>
      <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
      </div>
      <canvas id="particles-canvas"></canvas>
    </div>

    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo-wrapper">
          <img src="https://assets.wuiltstore.com/cmksv9bcw0ki601gn64lf4joy_Gemini_Generated_Image_8x0fug8x0fug8x0f.webp" alt="ميلانو" class="auth-logo">
          <div class="auth-logo-glow"></div>
        </div>
        <h1>ميلانو <span style="background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent">F16</span></h1>
        <p>ابدأ تكسب مع برنامج العمولة</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">
          <i class="fi fi-rr-sign-in-alt"></i> تسجيل الدخول
        </button>
        <button class="auth-tab" data-tab="register" onclick="switchTab('register')">
          <i class="fi fi-rr-user-add"></i> حساب جديد
        </button>
      </div>

      <form id="login-form" style="display:block;">
        <div class="alert alert-error" style="display:none;"></div>
        <div class="form-group">
          <label><i class="fi fi-rr-envelope"></i> البريد الإلكتروني</label>
          <input type="email" id="login-email" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label><i class="fi fi-rr-lock"></i> كلمة المرور</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:1rem">
          <span class="btn-text"><i class="fi fi-rr-sign-in-alt"></i> تسجيل الدخول</span>
        </button>
        <div class="auth-divider">أو</div>
        <button type="button" class="btn btn-google" onclick="handleGoogleLogin()">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          الدخول بـ Google
        </button>
      </form>

      <form id="register-form" style="display:none;">
        <div class="alert alert-error" style="display:none;"></div>
        <div class="form-group">
          <label><i class="fi fi-rr-user"></i> الاسم الكامل</label>
          <input type="text" id="reg-name" placeholder="محمد أحمد" required>
        </div>
        <div class="form-group">
          <label><i class="fi fi-rr-phone-call"></i> رقم التليفون</label>
          <input type="tel" id="reg-phone" placeholder="01012345678" required>
        </div>
        <div class="form-group">
          <label><i class="fi fi-rr-envelope"></i> البريد الإلكتروني</label>
          <input type="email" id="reg-email" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label><i class="fi fi-rr-lock"></i> كلمة المرور</label>
          <input type="password" id="reg-password" placeholder="6 أحرف على الأقل" required minlength="6">
        </div>
        <button type="submit" class="btn btn-success btn-block btn-lg" style="margin-top:1rem;background:linear-gradient(135deg,#10b981,#059669);color:white;box-shadow:0 4px 15px rgba(16,185,129,0.3)">
          <span class="btn-text"><i class="fi fi-rr-user-add"></i> إنشاء حساب</span>
        </button>
        <div class="auth-divider">أو</div>
        <button type="button" class="btn btn-google" onclick="handleGoogleLogin()">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          التسجيل بـ Google
        </button>
      </form>

      <p style="text-align:center;margin-top:1.5rem;font-size:.85rem;color:var(--text-secondary)">
        عندك حساب بالفعل؟ <a href="auth.html" style="color:var(--primary);font-weight:600">سجّل دخولك</a>
      </p>

      <div style="text-align:center;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)">
        <a href="admin-login.html" class="admin-login-link">
          <i class="fi fi-rr-lock"></i> دخول الإدارة
        </a>
      </div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>

  <!-- Particles Animation -->
  <script>
    const canvas = document.getElementById('particles-canvas');
    if (canvas) {
      const ctx = canvas.getContext('2d');
      let particles = [];
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      class Particle {
        constructor() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.size = Math.random() * 3 + 1;
          this.speedX = (Math.random() - 0.5) * 0.5;
          this.speedY = (Math.random() - 0.5) * 0.5;
          this.opacity = Math.random() * 0.5 + 0.2;
        }
        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
          if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
          ctx.fill();
        }
      }

      for (let i = 0; i < 40; i++) particles.push(new Particle());

      function connectParticles() {
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 120) {
              ctx.beginPath();
              ctx.strokeStyle = `rgba(255, 255, 255, ${0.08 * (1 - dist / 120)})`;
              ctx.lineWidth = 0.5;
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }
      }

      function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        connectParticles();
        requestAnimationFrame(animateParticles);
      }
      animateParticles();
    }
  </script>
</body>
</html>
