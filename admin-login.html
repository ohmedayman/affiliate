<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دخول الإدارة - ميلانو F16</title>
  <link rel="icon" href="https://assets.wuiltstore.com/cmksv9bcw0ki601gn64lf4joy_Gemini_Generated_Image_8x0fug8x0fug8x0f.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    
    body{
      font-family:'Cairo',sans-serif;
      background:linear-gradient(135deg,#0a1628 0%,#0d2137 50%,#0a1628 100%);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      direction:rtl;
      overflow:hidden;
      position:relative
    }

    /* Background particles */
    .bg-particles{
      position:fixed;
      top:0;left:0;right:0;bottom:0;
      overflow:hidden;
      z-index:0
    }
    .particle{
      position:absolute;
      width:4px;height:4px;
      background:rgba(239,68,68,0.3);
      border-radius:50%;
      animation:float 15s infinite linear
    }
    .particle:nth-child(1){left:10%;animation-delay:0s}
    .particle:nth-child(2){left:25%;animation-delay:2s}
    .particle:nth-child(3){left:40%;animation-delay:4s}
    .particle:nth-child(4){left:55%;animation-delay:1s}
    .particle:nth-child(5){left:70%;animation-delay:3s}
    .particle:nth-child(6){left:85%;animation-delay:5s}

    @keyframes float{
      0%{transform:translateY(100vh) rotate(0deg);opacity:0}
      10%{opacity:1}
      90%{opacity:1}
      100%{transform:translateY(-100vh) rotate(720deg);opacity:0}
    }

    /* Container */
    .container{
      position:relative;
      z-index:1;
      width:100%;
      max-width:420px;
      padding:1.5rem
    }

    /* Card */
    .card{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:20px;
      padding:2rem;
      backdrop-filter:blur(20px);
      animation:fadeInUp .6s ease
    }

    /* Header */
    .header{
      text-align:center;
      margin-bottom:2rem
    }
    .logo{
      width:70px;
      height:70px;
      border-radius:16px;
      object-fit:cover;
      margin:0 auto 1rem;
      display:block;
      box-shadow:0 8px 32px rgba(239,68,68,0.3)
    }
    .shield{
      font-size:2.5rem;
      margin-bottom:.8rem;
      filter:drop-shadow(0 4px 15px rgba(255,255,255,0.2))
    }
    h1{
      font-size:1.4rem;
      font-weight:800;
      margin-bottom:.3rem;
      background:linear-gradient(135deg,#fff,#e0e7ff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text
    }
    .subtitle{
      font-size:.85rem;
      color:rgba(255,255,255,0.5)
    }

    /* Form */
    .form-group{
      margin-bottom:1rem
    }
    .form-group label{
      display:block;
      font-size:.8rem;
      font-weight:600;
      color:rgba(255,255,255,0.7);
      margin-bottom:.4rem
    }
    .form-group input{
      width:100%;
      padding:.8rem 1rem;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:10px;
      font-size:.9rem;
      color:white;
      font-family:'Cairo',sans-serif;
      transition:all .2s
    }
    .form-group input::placeholder{
      color:rgba(255,255,255,0.3)
    }
    .form-group input:focus{
      outline:none;
      border-color:#3b82f6;
      background:rgba(255,255,255,0.12);
      box-shadow:0 0 0 3px rgba(59,130,246,0.2)
    }

    /* Error message */
    .error-msg{
      display:none;
      background:rgba(239,68,68,0.15);
      border:1px solid rgba(239,68,68,0.3);
      border-radius:10px;
      padding:.8rem 1rem;
      font-size:.85rem;
      color:#fca5a5;
      margin-bottom:1rem;
      text-align:center
    }
    .error-msg.show{
      display:block;
      animation:shake .4s ease
    }
    @keyframes shake{
      0%,100%{transform:translateX(0)}
      25%{transform:translateX(-5px)}
      75%{transform:translateX(5px)}
    }

    /* Success message */
    .success-msg{
      display:none;
      background:rgba(16,185,129,0.15);
      border:1px solid rgba(16,185,129,0.3);
      border-radius:10px;
      padding:.8rem 1rem;
      font-size:.85rem;
      color:#6ee7b7;
      margin-bottom:1rem;
      text-align:center
    }
    .success-msg.show{
      display:block
    }

    /* Buttons */
    .btn{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:.5rem;
      width:100%;
      padding:.9rem;
      border-radius:12px;
      font-weight:700;
      font-size:.95rem;
      cursor:pointer;
      border:none;
      transition:all .3s ease;
      font-family:'Cairo',sans-serif
    }
    .btn:active{transform:scale(.97)}
    
    .btn-primary{
      background:linear-gradient(135deg,#dc2626,#ef4444);
      color:white;
      box-shadow:0 4px 20px rgba(220,38,38,0.3);
      margin-top:1rem
    }
    .btn-primary:hover{
      box-shadow:0 6px 25px rgba(220,38,38,0.4);
      transform:translateY(-2px)
    }
    .btn-primary:disabled{
      opacity:.6;
      cursor:not-allowed;
      transform:none
    }

    .btn-google{
      background:rgba(255,255,255,0.1);
      color:white;
      border:1px solid rgba(255,255,255,0.2);
      margin-top:.8rem
    }
    .btn-google:hover{
      background:rgba(255,255,255,0.15);
      border-color:rgba(255,255,255,0.3)
    }

    /* Divider */
    .divider{
      display:flex;
      align-items:center;
      gap:1rem;
      margin:1.2rem 0;
      color:rgba(255,255,255,0.3);
      font-size:.8rem
    }
    .divider::before,.divider::after{
      content:'';
      flex:1;
      height:1px;
      background:rgba(255,255,255,0.1)
    }

    /* Back link */
    .back-link{
      display:block;
      text-align:center;
      margin-top:1.5rem;
      font-size:.85rem;
      color:rgba(255,255,255,0.5);
      text-decoration:none;
      transition:color .2s
    }
    .back-link:hover{
      color:#60a5fa
    }

    /* Spinner */
    .spinner{
      display:none;
      width:20px;
      height:20px;
      border:2px solid rgba(255,255,255,0.3);
      border-top-color:white;
      border-radius:50%;
      animation:spin .7s linear infinite
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Animation */
    @keyframes fadeInUp{
      from{opacity:0;transform:translateY(20px)}
      to{opacity:1;transform:translateY(0)}
    }

    /* Security badge */
    .security{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:.4rem;
      margin-top:1.5rem;
      font-size:.7rem;
      color:rgba(255,255,255,0.3)
    }
    .security-dot{
      width:6px;height:6px;
      background:#10b981;
      border-radius:50%;
      animation:dotPulse 2s ease-in-out infinite
    }
    @keyframes dotPulse{
      0%,100%{opacity:1}
      50%{opacity:.4}
    }

    /* Responsive */
    @media(max-width:480px){
      .container{padding:1rem}
      .card{padding:1.5rem}
    }
  </style>
</head>
<body>
  <!-- Background particles -->
  <div class="bg-particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="container">
    <div class="card">
      <!-- Header -->
      <div class="header">
        <img src="https://assets.wuiltstore.com/cmksv9bcw0ki601gn64lf4joy_Gemini_Generated_Image_8x0fug8x0fug8x0f.webp" alt="ميلانو" class="logo">
        <div class="shield">🔐</div>
        <h1>دخول الإدارة</h1>
        <p class="subtitle">لوحة تحكم ميلانو F16</p>
      </div>

      <!-- Error message -->
      <div class="error-msg" id="error-msg"></div>
      
      <!-- Success message -->
      <div class="success-msg" id="success-msg"></div>

      <!-- Login form -->
      <form id="admin-login-form">
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="admin-email" placeholder="admin@milanof16.com" required>
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="admin-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn">
          <span class="btn-text">دخول الإدارة</span>
          <div class="spinner" id="login-spinner"></div>
        </button>
      </form>

      <!-- Divider -->
      <div class="divider">أو</div>

      <!-- Google login -->
      <button class="btn btn-google" onclick="handleGoogleLogin()">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        الدخول بـ Google
      </button>

      <!-- Back link -->
      <a href="auth.html" class="back-link">← العودة لتسجيل الدخول العادي</a>

      <!-- Security badge -->
      <div class="security">
        <div class="security-dot"></div>
        <span>وصول آمن ومحمي</span>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');
    const loginBtn = document.getElementById('login-btn');
    const loginSpinner = document.getElementById('login-spinner');
    const btnText = loginBtn.querySelector('.btn-text');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
      successMsg.classList.remove('show');
    }

    function showSuccess(msg) {
      successMsg.textContent = msg;
      successMsg.classList.add('show');
      errorMsg.classList.remove('show');
    }

    function hideMessages() {
      errorMsg.classList.remove('show');
      successMsg.classList.remove('show');
    }

    function setLoading(loading) {
      if (loading) {
        loginBtn.disabled = true;
        btnText.style.display = 'none';
        loginSpinner.style.display = 'block';
      } else {
        loginBtn.disabled = false;
        btnText.style.display = 'inline';
        loginSpinner.style.display = 'none';
      }
    }

    // Check if already logged in as admin
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        const doc = await db.collection('affiliates').doc(user.uid).get();
        if (doc.exists && doc.data().isAdmin) {
          window.location.href = 'admin.html';
        }
      }
    });

    // Email/password login
    document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();
      setLoading(true);

      const email = document.getElementById('admin-email').value.trim();
      const password = document.getElementById('admin-password').value;

      try {
        const result = await auth.signInWithEmailAndPassword(email, password);
        const doc = await db.collection('affiliates').doc(result.user.uid).get();
        
        if (!doc.exists || !doc.data().isAdmin) {
          showError('ليس لديك صلاحية الوصول للوحة الإدارة');
          await auth.signOut();
          setLoading(false);
          return;
        }

        showSuccess('تم تسجيل الدخول بنجاح!');
        setTimeout(() => {
          window.location.href = 'admin.html';
        }, 500);
      } catch (error) {
        setLoading(false);
        let msg = 'حدث خطأ في تسجيل الدخول';
        if (error.code === 'auth/user-not-found') msg = 'البريد الإلكتروني غير مسجل';
        else if (error.code === 'auth/wrong-password') msg = 'كلمة المرور غير صحيحة';
        else if (error.code === 'auth/invalid-email') msg = 'البريد الإلكتروني غير صالح';
        else if (error.code === 'auth/too-many-requests') msg = 'تم حظر الحساب مؤقتاً بسبب محاولات كثيرة';
        showError(msg);
      }
    });

    // Google login
    async function handleGoogleLogin() {
      hideMessages();
      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        const result = await auth.signInWithPopup(provider);
        const doc = await db.collection('affiliates').doc(result.user.uid).get();
        
        if (!doc.exists || !doc.data().isAdmin) {
          showError('ليس لديك صلاحية الوصول للوحة الإدارة');
          await auth.signOut();
          return;
        }

        showSuccess('تم تسجيل الدخول بنجاح!');
        setTimeout(() => {
          window.location.href = 'admin.html';
        }, 500);
      } catch (error) {
        let msg = 'حدث خطأ في تسجيل الدخول بـ Google';
        if (error.code === 'auth/popup-closed-by-user') msg = 'تم إغلاق نافذة تسجيل الدخول';
        showError(msg);
      }
    }
  </script>
</body>
</html>
