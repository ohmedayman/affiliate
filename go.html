<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>جاري التحويل... - ميلانو F16</title>
  <link rel="icon" href="https://assets.wuiltstore.com/cmksv9bcw0ki601gn64lf4joy_Gemini_Generated_Image_8x0fug8x0fug8x0f.webp">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0d47a1,#1a237e);min-height:100vh;display:flex;align-items:center;justify-content:center;color:white;text-align:center}
    .loader{animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:.7}}
    h1{font-size:1.5rem;margin:1rem 0 .5rem}
    p{opacity:.8;margin-bottom:2rem}
    .spinner{width:50px;height:50px;border:4px solid rgba(255,255,255,.2);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1.5rem}
    @keyframes spin{to{transform:rotate(360deg)}}
    .btn{display:inline-block;padding:.8rem 2rem;background:white;color:#1a73e8;border-radius:10px;font-weight:600;text-decoration:none;transition:all .3s}
    .btn:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(0,0,0,.2)}
  </style>
</head>
<body>
  <div>
    <div class="loader" style="font-size:4rem">🛡️</div>
    <div class="spinner"></div>
    <h1>جاري التحويل...</h1>
    <p>هتتنقل لمتجر ميلانو خلال ثانية</p>
    <a href="https://milanof16.com/ar" id="redirect-link" class="btn">اضغط هنا لو محولتش</a>
  </div>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    async function handleRedirect() {
      const path = window.location.pathname;
      const parts = path.split('/go/').filter(Boolean);

      if (!parts || parts.length === 0) {
        showError('رابط غير صالح');
        return;
      }

      const code = parts[0];
      let targetUrl = 'https://milanof16.com/ar';

      try {
        // Check if it's a referral code (short, no slash)
        if (!code.includes('/') && parts.length === 1) {
          // It's a referral code like /go/mohmedayman5925
          targetUrl = 'https://milanof16.com/ar';
          await trackReferralClick(code);
        }
        // Check if it's a product link like /go/mohmedayman5925/abc123
        else if (parts.length >= 2) {
          const refCode = parts[0];
          const encodedUrl = parts[1];
          // Try to decode the product URL
          try {
            const decoded = atob(encodedUrl + '==');
            if (decoded.startsWith('http')) {
              targetUrl = decoded;
            }
          } catch(e) {
            // If decode fails, just use ref code
            targetUrl = 'https://milanof16.com/ar';
          }
          await trackReferralClick(refCode);
        }
      } catch(e) {
        console.error('Redirect error:', e);
      }

      document.getElementById('redirect-link').href = targetUrl;
      setTimeout(() => { window.location.href = targetUrl; }, 1000);
    }

    async function trackReferralClick(code) {
      try {
        // Find affiliate by referral code
        const affSnap = await db.collection('affiliates').where('referralCode','==',code).limit(1).get();
        if (!affSnap.empty) {
          const affDoc = affSnap.docs[0];

          // Log the click
          await db.collection('clicks').add({
            affiliateId: affDoc.id,
            referralCode: code,
            type: 'referral_click',
            userAgent: navigator.userAgent,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });

          // Increment affiliate clicks
          await db.collection('affiliates').doc(affDoc.id).update({
            totalClicks: firebase.firestore.FieldValue.increment(1)
          });
        }
      } catch(e) {
        console.error('Click tracking error:', e);
      }
    }

    function showError(msg) {
      document.body.innerHTML = `
        <div style="text-align:center">
          <h1 style="font-size:2rem;margin-bottom:1rem">⚠️</h1>
          <h1>${msg}</h1>
          <a href="/" style="color:white;margin-top:2rem;display:inline-block">العودة للرئيسية</a>
        </div>`;
    }

    handleRedirect();
  </script>
</body>
</html>
