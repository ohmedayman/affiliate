<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - ميلانو F16</title>
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css">
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-bold-rounded/css/uicons-bold-rounded.css">
  <link rel="icon" href="https://assets.wuiltstore.com/cmksv9bcw0ki601gn64lf4joy_Gemini_Generated_Image_8x0fug8x0fug8x0f.webp">
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <div class="sidebar-brand"><img src="https://assets.wuiltstore.com/cmksv9bcw0ki601gn64lf4joy_Gemini_Generated_Image_8x0fug8x0fug8x0f.webp" alt="ميلانو" style="width:36px;height:36px;border-radius:10px;object-fit:cover"> ميلانو <span>F16</span></div>
      <div class="sidebar-user">
        <div class="user-avatar" id="user-avatar">👤</div>
        <div class="user-name" id="user-name">جاري التحميل...</div>
        <div class="user-tier" id="user-tier">🥉 برونزي</div>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section">
          <div class="sidebar-section-title">القائمة الرئيسية</div>
          <a href="#" data-page="overview" class="active"><i class="fi fi-rr-layout-fluid"></i> الرئيسية</a>
          <a href="#" data-page="referrals"><i class="fi fi-rr-users"></i> الإحالات <span class="nav-badge" id="ref-count">0</span></a>
          <a href="#" data-page="products"><i class="fi fi-rr-box-open"></i> المنتجات</a>
          <a href="#" data-page="leaderboard"><i class="fi fi-rr-trophy"></i> الترتيب</a>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-section-title">الأرباح</div>
          <a href="#" data-page="payouts"><i class="fi fi-rr-money-bill-wave"></i> المدفوعات</a>
          <a href="#" data-page="coupons"><i class="fi fi-rr-ticket"></i> كوبوناتي</a>
          <a href="#" data-page="marketing"><i class="fi fi-rr-megaphone"></i> مواد تسويقية</a>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-section-title">أخرى</div>
          <a href="#" data-page="badges"><i class="fi fi-rr-award"></i> الشارات</a>
          <a href="#" data-page="training"><i class="fi fi-rr-book-open"></i> التدريب</a>
          <a href="#" data-page="notifications"><i class="fi fi-rr-bell"></i> الإشعارات <span class="nav-badge" id="notif-count">0</span></a>
          <a href="#" data-page="settings"><i class="fi fi-rr-settings"></i> الإعدادات</a>
        </div>
      </nav>
      <div class="sidebar-footer">
        <a href="#" id="sidebar-logout">🚪 تسجيل الخروج</a>
      </div>
    </aside>

    <main class="main-content">
      <div id="page-content">
        <div class="loading-page"><div class="spinner spinner-dark"></div><p style="color:var(--text-secondary)">جاري تحميل البيانات...</p></div>
      </div>
    </main>
  </div>

  <div class="notification-panel" id="notification-panel">
    <div class="notification-drawer">
      <div class="notification-header">
        <h3>الإشعارات</h3>
        <button class="btn btn-sm btn-ghost" onclick="closeNotifications()">✕</button>
      </div>
      <div id="notification-list"></div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-content"></div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
